management.load_definitions = /etc/rabbitmq/definitions.json
# ВКЛЮЧАЕМ ВЫВОДЫ
log.console = true
log.file = food.log

# УРОВНИ ДЛЯ ВЫВОДОВ
# Консоль - только предупреждения и ошибки (оперативный мониторинг)
log.console.level = warning

# Файл - максимальная детализация для аудита
log.file.level = debug

# ТОНКАЯ НАСТРОЙКА ПО КАТЕГОРИЯМ
# Отладка соединений слишком шумная - поднимаем до info
log.connection.level = info

# Логи обновлений не нужны
log.upgrade.level = none

# НАСТРОЙКА РОТАЦИИ И ФОРМАТА
# JSON-формат для машинного анализа
log.file.formatter = json

# Ротация по достижении 10 мегабайт
log.file.rotation.size = 10485760

# Храним последние 3 файла
log.file.rotation.count = 3