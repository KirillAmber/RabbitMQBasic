# 1. ВКЛЮЧАЕМ ВЫВОДЫ
log.console = true
log.file = rabbitmq.log

# 2. УСТАНАВЛИВАЕМ УРОВНИ ДЛЯ ВЫВОДОВ
# Консоль: сюда пойдут только предупреждения и ошибки.
# Это для оперативного мониторинга, чтобы не пропустить проблемы.
log.console.level = warning

# Файл: сюда пойдет вся полезная информация о работе,
# включая отладочную, для последующего анализа.
log.file.level = debug

# 3. УСТАНАВЛИВАЕМ УРОВНИ ДЛЯ КАТЕГОРИЙ (ТОНКАЯ НАСТРОЙКА)
# Мы хотим видеть в файле ВСЁ, кроме отладочной информации о соединениях,
# так как каждое сетевое событие плодит слишком много записей.
log.connection.level = info

# Логи обновлений при старте нам не интересны совсем.
log.upgrade.level = none

# 4. НАСТРОЙКА РОТАЦИИ И ФОРМАТА
# Файлы логов будут в JSON для удобства машинного анализа.
log.file.formatter = json
# Ротация будет происходить по расписанию, каждый день в полночь
log.file.rotation.date = $D0
log.file.rotation.count = 7