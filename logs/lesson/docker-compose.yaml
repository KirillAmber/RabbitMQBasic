services:
  rabbitmq:
    image: rabbitmq:3.10-management
    container_name: rabbitmq_log
    hostname: rabbitmq_log
    ports:
      - "15672:15672"
      - "5672:5672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      # Монтируем нашу готовую конфигурацию в контейнер
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      # Volume для постоянного хранения файлов логов
      - rabbitmq-logs:/var/log/rabbitmq
      # Добавляем файл с плагинами
      - ./enabled_plugins:/etc/rabbitmq/enabled_plugins
volumes:
  rabbitmq-logs: