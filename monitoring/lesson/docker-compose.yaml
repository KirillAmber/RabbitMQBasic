services:
  rabbitmq:
    image: rabbitmq:3.10-management
    container_name: rabbitmq_monitoring
    hostname: rabbitmq_monitoring
    ports:
      - "15672:15672"
      - "5672:5672"
      - "15692:15692"          # Порт для метрик Prometheus
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"            # Веб-интерфейс и API
    volumes:
      # Основная конфигурация: что и как собирать
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      # Постоянное хранилище для собранных метрик
      - prometheus-data:/prometheus
    depends_on:
      - rabbitmq

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"            # Веб-интерфейс Grafana
    environment:
      # Учётные данные администратора
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      # Автоматическая регистрация источника данных Prometheus
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      # Автоматическая загрузка дашбордов RabbitMQ
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      # Каталог с JSON-моделью дашборда
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      # Постоянное хранилище для настроек Grafana
      - grafana-data:/var/lib/grafana

volumes:
  prometheus-data:
  grafana-data: